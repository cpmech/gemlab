[package]
name = "gemlab"
version = "1.1.0"
edition = "2021"
license = "MIT"
description = "Geometry and meshes laboratory for finite element analyses"
homepage = "https://github.com/cpmech/gemlab"
repository = "https://github.com/cpmech/gemlab"
documentation = "https://docs.rs/gemlab"
readme = "README.md"
categories = ["mathematics", "science"]
keywords = ["geometry", "mesh", "fem"]

[dependencies]
plotpy = { path = "../plotpy" }
russell_lab = { path = "../russell/russell_lab", features = ["intel_mkl"] }
russell_sparse = { path = "../russell/russell_sparse", features = [
  "local_suitesparse",
  "with_mumps",
  "intel_mkl",
] }
russell_stat = { path = "../russell/russell_stat", features = ["intel_mkl"] }
russell_tensor = { path = "../russell/russell_tensor", features = [
  "intel_mkl",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tritet = "0.4"

[dev-dependencies]
criterion = "0.5"
